name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils libgl1

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Run Linting (Ruff)
        run: uv run ruff check .

      - name: Run Type Checking (ty)
        run: |
          uv run ty check \
            --exclude "tests/" --exclude "docs/" --exclude "build/" --exclude "dist/" --exclude ".venv/" \
            --ignore "no-matching-overload" \
            --ignore "unresolved-attribute" \
            --ignore "invalid-method-override" \
            --ignore "not-iterable" \
            --ignore "unsupported-operator" \
            --ignore "invalid-argument-type" \
            --ignore "unused-type-ignore-comment" \
            --ignore "unresolved-import" \
            --ignore "unsupported-bool-conversion" \
            --ignore "invalid-assignment" \
            --ignore "invalid-parameter-default" \
            --ignore "call-non-callable"

      - name: Run Tests
        run: uv run pytest tests/ --cov=negpy --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7
